<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Mirror</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center font-serif text-stone-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [mood, setMood] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            // 1. PASTE YOUR OLD KEY INSIDE THESE QUOTES
            const API_KEY = "AIzaSyAvhiIPnFPILwcUAyUfclyWOFayvNQqAss"; 

            const handleReveal = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    // This talks DIRECTLY to Google, skipping the 500 error
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: `Give me one flower name and one short quote for the mood: ${mood}. Format: FLOWER: [Name] | QUOTE: [Quote]` }]
                            }]
                        })
                    });

                    const data = await response.json();

                    if (data.error) {
                        alert("Google Error: " + data.error.message);
                        setLoading(false);
                        return;
                    }

                    const text = data.candidates[0].content.parts[0].text;
                    const flowerName = text.split('|')[0].replace('FLOWER:', '').trim();
                    const quote = text.split('|')[1]?.replace('QUOTE:', '').trim() || "Embrace the beauty.";
                    
                    setResult({ flowerName, quote });
                } catch (err) { 
                    alert("The Mirror is still foggy. Check the Console!");
                }
                setLoading(false);
            };

            return (
                <div className="max-w-md w-full p-8 text-center">
                    {!result ? (
                        <form onSubmit={handleReveal} className="space-y-6">
                            <h1 className="text-3xl text-emerald-900 italic">How is your heart today?</h1>
                            <input 
                                type="text" 
                                value={mood} 
                                onChange={(e) => setMood(e.target.value)} 
                                placeholder="Type a feeling..." 
                                className="w-full border-b-2 border-emerald-200 bg-transparent text-center text-xl focus:outline-none focus:border-emerald-600 pb-2"
                                required
                            />
                            <button className="bg-emerald-800 text-white px-8 py-3 rounded-full hover:bg-emerald-700 transition shadow-lg w-full">
                                {loading ? "Reflecting..." : "Reveal My Flower"}
                            </button>
                        </form>
                    ) : (
                        <div className="bg-white p-10 rounded-2xl shadow-2xl space-y-6 border border-emerald-50 animate-in fade-in">
                            <div className="text-emerald-800 text-5xl">❀</div>
                            <h2 className="text-2xl text-emerald-900 font-bold uppercase tracking-widest">{result.flowerName}</h2>
                            <p className="italic text-stone-600 text-lg leading-relaxed">"{result.quote}"</p>
                            <button onClick={() => {setResult(null); setMood('');}} className="text-emerald-600 underline text-sm mt-4">
                                Look into the mirror again
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
