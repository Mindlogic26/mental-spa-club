<!DOCTYPE html>
<html>
<head>
    <title>Floral Mirror</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center font-serif">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        function App() {
            const [mood, setMood] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleReveal = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ mood })
                    });
                    const data = await response.json();
                    // This is the "Magic Fix": It digs deeper into the Google response
                    const text = data.candidates[0].content.parts[0].text;
                    const flowerName = text.split('|')[0].replace('FLOWER:', '').trim();
                    const quote = text.split('|')[1]?.replace('QUOTE:', '').trim() || "Embrace the beauty.";
                    setResult({ flowerName, quote });
                } catch (err) { 
                    console.error(err);
                    alert("Mirror is foggy. Try a different mood!"); 
                }
                setLoading(false);
            };

            return (
                <div className="max-w-md w-full p-8 text-center">
                    {!result ? (
                        <form onSubmit={handleReveal} className="space-y-6">
                            <h1 className="text-3xl text-emerald-900">How is your heart?</h1>
                            <input type="text" value={mood} onChange={(e)=>setMood(e.target.value)} placeholder="Type a feeling..." className="w-full border-b-2 border-emerald-200 bg-transparent text-center text-xl focus:outline-none focus:border-emerald-600 pb-2"/>
                            <button className="bg-emerald-800 text-white px-8 py-3 rounded-full hover:bg-emerald-700">{loading ? "Reflecting..." : "Reveal My Flower"}</button>
                        </form>
                    ) : (
                        <div className="bg-white p-6 rounded-2xl shadow-xl space-y-4">
                            <h2 className="text-2xl text-emerald-900">{result.flowerName}</h2>
                            <p className="italic text-gray-600">"{result.quote}"</p>
                            <button onClick={()=>setResult(null)} className="text-emerald-600 underline text-sm">Clear Mirror</button>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
