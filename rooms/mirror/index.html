<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Mirror</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center font-serif text-stone-800 p-6">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl text-emerald-900 italic mb-6">Mirror Connection Test</h1>
        
        <div class="space-y-6">
            <button id="testBtn" class="bg-emerald-800 text-white px-8 py-3 rounded-full hover:bg-emerald-700 transition shadow-lg w-full font-bold">
                Test AI Connection
            </button>
            <div id="output" class="mt-8 p-6 bg-stone-50 rounded-2xl italic text-stone-700 min-h-[100px] flex items-center justify-center border border-emerald-50">
                The mirror is waiting...
            </div>
        </div>
        <a href="/" class="block mt-8 text-emerald-600 underline text-sm">Back to Lobby</a>
    </div>

    <script>
        // Accesses the secret variable you set in the Vercel Dashboard
        const API_KEY = process.env.NEXT_PUBLIC_GEMINI_KEY; 
        const MODEL_ID = "gemini-2.0-flash"; // Updated for 2026 stability

        document.getElementById('testBtn').onclick = async () => {
            const out = document.getElementById('output');
            
            // Safety check: Alert if the variable isn't found
            if (!API_KEY) {
                out.innerHTML = "<span class='text-red-600'>Variable not found. Did you redeploy in Vercel?</span>";
                return;
            }

            out.innerText = "Polishing the glass...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Pick one random flower and a short quote." }] }]
                    })
                });
                const data = await response.json();
                out.innerText = data.error ? data.error.message : data.candidates[0].content.parts[0].text;
            } catch (err) {
                out.innerText = "Failed to connect. Check Vercel logs.";
            }
        };
    </script>
</body>
</html>
