<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Mirror</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center font-serif">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [mood, setMood] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            // This is the part you were struggling with! It's now inside the "App"
            const handleReveal = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ mood })
                    });
                    const data = await response.json();

                    // LOG THE FULL DATA: Look at your console to see the real message!
                    console.log("Full Response from Brain:", data);

                    // 1. Check if Google sent an error
                    if (data.error) {
                        alert("Google says: " + data.error.message);
                        return;
                    }

                    // 2. Check if the response is empty
                    if (!data.candidates || data.candidates.length === 0) {
                        alert("Google sent an empty box. Check if your API is enabled!");
                        return;
                    }

                    const text = data.candidates[0].content.parts[0].text;
                    const flowerName = text.split('|')[0].replace('FLOWER:', '').trim();
                    const quote = text.split('|')[1]?.replace('QUOTE:', '').trim() || "Embrace the beauty.";
                    setResult({ flowerName, quote });

                } catch (err) { 
                    console.error("Mirror Error:", err);
                    alert("Mirror is foggy. Try refreshing the page!"); 
                }
                setLoading(false);
            };



            return (
                <div className="max-w-md w-full p-8 text-center">
                    {!result ? (
                        <form onSubmit={handleReveal} className="space-y-6">
                            <h1 className="text-3xl text-emerald-900">How is your heart?</h1>
                            <input 
                                type="text" 
                                value={mood} 
                                onChange={(e) => setMood(e.target.value)} 
                                placeholder="Type a feeling..." 
                                className="w-full border-b-2 border-emerald-200 bg-transparent text-center text-xl focus:outline-none focus:border-emerald-600 pb-2"
                            />
                            <button className="bg-emerald-800 text-white px-8 py-3 rounded-full hover:bg-emerald-700 transition shadow-lg">
                                {loading ? "Reflecting..." : "Reveal My Flower"}
                            </button>
                            <div className="mt-4 text-sm text-stone-400">
                                <a href="/" className="hover:underline">Back to Lobby</a>
                            </div>
                        </form>
                    ) : (
                        <div className="bg-white p-8 rounded-2xl shadow-2xl space-y-6 border border-emerald-50 animate-fade-in">
                            <div className="text-emerald-800 text-4xl">❀</div>
                            <h2 className="text-2xl text-emerald-900 font-bold">{result.flowerName}</h2>
                            <p className="italic text-stone-600 text-lg">"{result.quote}"</p>
                            <button 
                                onClick={() => {setResult(null); setMood('');}} 
                                className="text-emerald-600 underline text-sm hover:text-emerald-800"
                            >
                                Clear Mirror
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
