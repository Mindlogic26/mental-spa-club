<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Mirror</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center font-serif text-stone-800 p-6">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl text-emerald-900 italic mb-6">Mirror Connection Test</h1>
        
        <div class="space-y-6">
            <p class="text-stone-600">Click below to see if the AI can reach your mirror.</p>
            <button id="testBtn" class="bg-emerald-800 text-white px-8 py-3 rounded-full hover:bg-emerald-700 transition shadow-lg w-full font-bold">
                Test AI Connection
            </button>
            <div id="output" class="mt-8 p-6 bg-stone-50 rounded-2xl italic text-stone-700 min-h-[100px] flex items-center justify-center border border-emerald-50">
                The mirror is waiting...
            </div>
        </div>
        <a href="/" class="block mt-8 text-emerald-600 underline text-sm">Back to Lobby</a>
    </div>

    <script>
        // REPLACE WITH YOUR NEW API KEY FROM GOOGLE AI STUDIO
        const API_KEY = "PASTE_YOUR_NEW_KEY_HERE"; 
        
        // Using the latest Gemini 3 model launched in 2026
        const MODEL_ID = "gemini-3-flash-preview"; 

        document.getElementById('testBtn').onclick = async () => {
            const out = document.getElementById('output');
            out.innerText = "Polishing the glass...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: "Pick one random flower name and a short quote about growth." }] 
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    // This catches specific Google errors like "Invalid API Key"
                    out.innerHTML = `<span class="text-red-600 font-bold">Error:</span> ${data.error.message}`;
                } else {
                    // Displays the AI's response clearly
                    out.innerText = data.candidates[0].content.parts[0].text;
                }
            } catch (err) {
                out.innerHTML = `<span class="text-red-600">Failed to connect. Check your internet or console logs.</span>`;
                console.error(err);
            }
        };
    </script>
</body>
</html>
