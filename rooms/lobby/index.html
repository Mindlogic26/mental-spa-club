<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mental Spa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fdfbf7; font-family: 'Georgia', serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-stone-800">
    
    <div class="max-w-2xl text-center px-6">
        <h1 class="text-5xl mb-6 text-emerald-900">Welcome to the Spa</h1>
        <p class="text-xl mb-12 italic text-stone-600">
            A quiet corner of the internet designed to help you breathe and find your center.
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <a href="/mirror" class="group p-8 border border-emerald-100 rounded-2xl hover:bg-emerald-50 transition-all duration-300">
                <h2 class="text-2xl mb-2 text-emerald-800 group-hover:scale-105 transition-transform">Floral Mirror</h2>
                <p class="text-sm text-stone-500">Reflect your mood through nature.</p>
            </a>

            <div class="p-8 border border-dashed border-stone-200 rounded-2xl opacity-50">
                <h2 class="text-2xl mb-2 text-stone-400">Coming Soon</h2>
                <p class="text-sm text-stone-400">A new room is being prepared.</p>
            </div>

        </div>
    </div>

</body>
</html>
