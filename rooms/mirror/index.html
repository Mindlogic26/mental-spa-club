<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Mirror</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center font-serif text-stone-800 p-6">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl text-center border border-emerald-50">
        <h1 class="text-3xl text-emerald-900 italic mb-6 uppercase tracking-tighter">Mirror Connection Test</h1>
        
        <div class="space-y-6">
            <button id="testBtn" class="bg-emerald-800 text-white px-8 py-3 rounded-full hover:bg-emerald-700 transition shadow-lg w-full font-bold text-lg">
                Test AI Connection
            </button>
            
            <div id="output" class="mt-8 p-6 bg-stone-50 rounded-2xl italic text-stone-700 min-h-[120px] flex flex-col items-center justify-center border border-emerald-100 whitespace-pre-wrap leading-relaxed">
                The mirror is waiting...
            </div>
        </div>
        
        <a href="/" class="block mt-8 text-emerald-600 underline text-sm hover:text-emerald-800">Back to Lobby</a>
    </div>

<script>
    // This looks for the key in the website address so it stays off GitHub
    const urlParams = new URLSearchParams(window.location.search);
    const API_KEY = urlParams.get('key'); 
    
    const MODEL_ID = "gemini-3-flash-preview"; 

    document.getElementById('testBtn').onclick = async () => {
        const out = document.getElementById('output');
        
        if (!API_KEY) {
            out.innerHTML = "<span class='text-red-600'>Mirror is foggy. Key missing in URL.</span>";
            return;
        }

        out.innerText = "Reflecting...";
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Pick one random flower and a short quote." }] }]
                })
            });
            const data = await response.json();
            out.innerText = data.candidates[0].content.parts[0].text;
        } catch (err) {
            out.innerText = "Connection failed.";
        }
    };
</script>
</body>
</html>
