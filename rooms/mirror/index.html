<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 flex items-center justify-center min-h-screen font-serif">
    <div class="text-center p-10 bg-white rounded-xl shadow-lg">
        <h1 class="text-2xl mb-4">Mirror Connection Test</h1>
        <button id="testBtn" class="bg-emerald-700 text-white px-6 py-2 rounded-full">
            Test AI Connection
        </button>
        <p id="output" class="mt-6 italic text-stone-600"></p>
    </div>

    <script>
        const API_KEY = "AIzaSyAvhiIPnFPILwcUAyUfclyWOFayvNQqAss"; // Put your fresh key here

        document.getElementById('testBtn').onclick = async () => {
            const out = document.getElementById('output');
            out.innerText = "Connecting to Google...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Pick one random flower and a 5-word quote." }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    out.innerText = "Error: " + data.error.message;
                } else {
                    out.innerText = data.candidates[0].content.parts[0].text;
                }
            } catch (err) {
                out.innerText = "The connection failed. Check the console.";
            }
        };
    </script>
</body>
</html>
