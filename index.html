<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Spa - Lobby</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen flex flex-col items-center justify-center font-serif text-stone-800">
    <h1 class="text-4xl mb-12 italic text-emerald-900">Welcome to the Spa</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-5xl w-full px-6 text-center">
    
    <a href="/rooms/mirror/index.html" class="group p-8 border-2 border-emerald-100 bg-white rounded-3xl shadow-sm hover:shadow-xl hover:border-emerald-500 transition-all">
        <img src="https://em-content.zobj.net/source/apple/391/mirror_1fa9e.png" alt="New Mirror" class="w-16 h-16 mx-auto mb-4 object-contain">
        <h2 class="text-lg font-bold text-emerald-800 uppercase tracking-widest">Experimental Mirror</h2>
        <p class="text-stone-500 text-sm italic mt-2">Testing new moods & animations</p>
    </a>

    <a href="https://the-floral-mirror.vercel.app/" target="_blank" class="group p-8 border-2 border-purple-100 bg-white rounded-3xl shadow-sm hover:shadow-xl hover:border-purple-500 transition-all">
        <img src="https://em-content.zobj.net/source/apple/391/framed-picture_1f5bc-fe0f.png" alt="Legacy Mirror" class="w-16 h-16 mx-auto mb-4 object-contain">
        <h2 class="text-lg font-bold text-purple-800 uppercase tracking-widest">Legacy Mirror</h2>
        <p class="text-stone-500 text-sm italic mt-2">Open original Vercel app</p>
    </a>

    <div class="p-8 border-2 border-stone-100 bg-stone-50 rounded-3xl opacity-50">
        <img src="https://em-content.zobj.net/source/apple/391/leaf-fluttering-in-wind_1f343.png" alt="Garden" class="w-16 h-16 mx-auto mb-4 object-contain grayscale">
        <h2 class="text-lg font-bold text-stone-400 uppercase tracking-widest">Garden Room</h2>
        <p class="text-stone-400 text-sm italic mt-2">Coming soon</p>
    </div>

</div>
</body>
</html>
