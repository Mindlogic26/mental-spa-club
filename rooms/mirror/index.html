<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Floral Mirror</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-bloom { animation: fadeIn 0.8s ease-out forwards; }
    </style>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center font-serif text-stone-800 p-6">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl text-center border border-emerald-50">
        <img src="https://em-content.zobj.net/source/apple/391/mirror_1fa9e.png" class="w-16 h-16 mx-auto mb-4 opacity-80" alt="Mirror">
        <h1 class="text-3xl text-emerald-900 italic mb-2">Floral Mirror</h1>
        <p class="text-stone-500 text-sm mb-8 italic text-balance">How does your heart feel today?</p>
        
        <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="setMood('Tired', '🔋')" class="mood-btn p-3 border rounded-xl hover:bg-emerald-50 transition">Tired 🔋</button>
            <button onclick="setMood('Anxious', '☁️')" class="mood-btn p-3 border rounded-xl hover:bg-emerald-50 transition">Anxious ☁️</button>
            <button onclick="setMood('Happy', '☀️')" class="mood-btn p-3 border rounded-xl hover:bg-emerald-50 transition">Happy ☀️</button>
            <button onclick="setMood('Lonely', '🌙')" class="mood-btn p-3 border rounded-xl hover:bg-emerald-50 transition">Lonely 🌙</button>
        </div>

        <button id="testBtn" class="bg-emerald-800 text-white px-8 py-4 rounded-full hover:bg-emerald-700 transition shadow-lg w-full font-bold text-lg disabled:opacity-50" disabled>
            Consult the Mirror
        </button>
        
        <div id="output" class="mt-8 p-6 bg-stone-50 rounded-2xl italic text-stone-700 min-h-[140px] flex flex-col items-center justify-center border border-emerald-100 leading-relaxed">
            Choose a mood to begin...
        </div>
        
        <a href="/" class="block mt-8 text-emerald-600 underline text-xs tracking-widest uppercase hover:text-emerald-800">Exit Room</a>
    </div>

    <script>
        let selectedMood = "";
        const API_KEY = "KEY"; // Keep this here for local VS Code testing
        const MODEL_ID = "gemini-3-flash-preview";

        function setMood(mood, emoji) {
            selectedMood = mood;
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('border-emerald-500', 'bg-emerald-50'));
            event.target.classList.add('border-emerald-500', 'bg-emerald-50');
            document.getElementById('testBtn').disabled = false;
            document.getElementById('testBtn').innerText = `Reflect my ${mood} mood`;
        }

        document.getElementById('testBtn').onclick = async () => {
            const out = document.getElementById('output');
            out.classList.remove('animate-bloom');
            out.innerHTML = `<span class="animate-pulse">Polishing the silver...</span>`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: `I am feeling ${selectedMood}. Suggest a specific flower and a 1-sentence healing quote for this mood. Format as: Flower: [Name] - Quote: [Text]` }] 
                        }]
                    })
                });

                const data = await response.json();
                out.classList.add('animate-bloom');
                out.innerText = data.candidates[0].content.parts[0].text;
            } catch (err) {
                out.innerText = "The glass is too foggy to see.";
            }
        };
    </script>
</body>
</html>
